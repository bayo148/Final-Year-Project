<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My E-commerce Chatbot{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f1f1;
        }
        header {
            background-color: #333;
            padding: 15px;
        }
        header nav a {
            color: #fff;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }
        header nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px;
            position: sticky;
            bottom: 0;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <!-- Example navigation items -->
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'chat' %}">Chat</a>
            <a href="{% url 'profile' %}">Profile</a>
            <a href="/admin/">Admin Dashboard</a>
            <!-- Logout link only if user is authenticated -->
            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </nav>
    </header>

    <div class="container">
        {% block content %}
        <!-- Content from child templates goes here -->
        {% endblock content %}
    </div>

    <footer>
        <p>&copy; 2025 My E-commerce Assistant</p>
    </footer>
</body>
</html>
